    d="M 36 4 L 11 4 Q 4 4 4 11 L 4 35 Q 4 42 11 42 L 26 42 L 42 26"
    stroke="#F97316"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Arrowhead at tip (42, 26) -->
  <path
    d="M 34 19 L 42 26 L 36 34"
    stroke="#F97316"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- 4 ascending bars, bottom-aligned at y=38, dark fill -->
  <rect x="10" y="29" width="4"   height="9"  rx="1.2" fill="#1C1C1C"/>
  <rect x="17" y="23" width="4"   height="15" rx="1.2" fill="#1C1C1C"/>
  <rect x="24" y="17" width="4"   height="21" rx="1.2" fill="#1C1C1C"/>
  <rect x="31" y="11" width="4"   height="27" rx="1.2" fill="#1C1C1C"/>


  <!-- ── WORDMARK ───────────────────────────────────────────── -->

  <text
    x="52"
    y="34"
    font-family="'Inter','Nunito','-apple-system','BlinkMacSystemFont','Segoe UI',sans-serif"
