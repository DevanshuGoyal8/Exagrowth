<svg width="210" height="40" viewBox="0 0 210 40" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Blue gradient for bars: full → translucent -->
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <!-- Glow filter for the mark -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── ICON MARK ───────────────────────────────────────────── -->

  <!-- Bracket: top arm → left-top corner → down → bottom-left corner → bottom → arrow diagonal -->
  <path
    d="M23 5 L8 5 Q4 5 4 9 L4 31 Q4 36 8 36 L15 36 L30 21"
    stroke="#2563EB"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Arrowhead at tip (30, 21) -->
  <path
    d="M23 17 L30 21 L26 28"
    stroke="#2563EB"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Three ascending bars, all bottom-aligned at y=33 -->
  <!-- Bar 1 — shortest, leftmost -->
  <rect x="8" y="23" width="4" height="10" rx="1.5" fill="url(#bar1)"/>
  <!-- Bar 2 — medium -->
  <rect x="15" y="16" width="4" height="17" rx="1.5" fill="url(#bar2)"/>
  <!-- Bar 3 — tallest, rightmost -->
  <rect x="22" y="9" width="4" height="24" rx="1.5" fill="url(#bar3)" opacity="0.75"/>


  <!-- ── WORDMARK ────────────────────────────────────────────── -->

  <!-- "Exa" — bold white -->
  <text
    x="44"
    y="27"
    font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-weight="800"
    font-size="20"
    letter-spacing="-0.5"
    fill="#FFFFFF"
  >Exa</text>

  <!-- "growth" — light weight, muted blue-gray -->
  <text
    x="83"
    y="27"
    font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-weight="300"
    font-size="20"
    letter-spacing="1"
    fill="#94A3B8"
  >growth</text>

</svg>
