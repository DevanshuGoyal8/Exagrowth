<svg width="240" height="48" viewBox="0 0 240 48" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ── ICON MARK (40×40) ──────────────────────────────────── -->

  <!-- Bracket: top-right → left along top → round top-left → down left → round bottom-left → right along bottom → diagonal arrow up-right -->
