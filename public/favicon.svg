<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- White background -->
  <rect width="32" height="32" rx="6" fill="#ffffff"/>

  <!-- Bracket shape -->
  <path
    d="M 25 4 L 8 4 Q 4 4 4 8 L 4 24 Q 4 28 8 28 L 17 28 L 28 17"
    stroke="#F97316"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Arrowhead -->
  <path
    d="M 22 12 L 28 17 L 23 23"
    stroke="#F97316"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- 4 ascending dark bars -->
  <rect x="7"  y="20" width="3" height="6"  rx="0.8" fill="#1C1C1C"/>
  <rect x="12" y="16" width="3" height="10" rx="0.8" fill="#1C1C1C"/>
  <rect x="17" y="12" width="3" height="14" rx="0.8" fill="#1C1C1C"/>
  <rect x="22" y="8"  width="3" height="18" rx="0.8" fill="#1C1C1C"/>
</svg>
