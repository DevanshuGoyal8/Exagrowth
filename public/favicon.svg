<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- 3 ascending bars, bottom-aligned at y=26 -->
  <rect x="5"  y="20" width="5" height="6"  rx="1.2" fill="url(#b1)"/>
  <rect x="13" y="14" width="5" height="12" rx="1.2" fill="url(#b2)"/>
  <rect x="21" y="8"  width="5" height="18" rx="1.2" fill="url(#b3)" opacity="0.85"/>

  <!-- Diagonal arrow: bottom-left → top-right -->
  <line x1="6" y1="25" x2="25" y2="7" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <polyline points="17,6 25,7 24,15" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
</svg>
